[package]
name = "banyan-cli"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
confy = { version = "0.5.0", features = ["yaml_conf"], default-features = false }
banyan-shared = { git = "https://github.com/banyancomputer/banyan-shared-rs", branch = "cli" }
clap = { version = "3.2.20", features = ["derive"] }
anyhow = "1.0.64"
serde = "1.0.144"
bao = "0.12.1"

[badges]
codecov = { repository = "banyancomputer/banyan-cli", branch = "master", service = "github" }
